name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate tag is from main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must be on the main branch."
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --draft \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup toolchain install stable --target "${{ matrix.target }}"
          rustup default stable

      - name: Install musl tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}" -p know_now_cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.create-release.outputs.tag }}"
          archive="know-now-${{ matrix.target }}.tar.gz"
          staging="release-staging"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/know-now" "$staging/"
          cp LICENSE-MIT LICENSE-APACHE "$staging/" 2>/dev/null || true
          cp README.md "$staging/" 2>/dev/null || true
          tar -czf "$archive" -C "$staging" .
          sha256sum "$archive" > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.create-release.outputs.tag }}"
          archive="know-now-${{ matrix.target }}.zip"
          staging="release-staging"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/know-now.exe" "$staging/"
          cp LICENSE-MIT LICENSE-APACHE "$staging/" 2>/dev/null || true
          cp README.md "$staging/" 2>/dev/null || true
          cd "$staging" && 7z a -tzip "../$archive" . && cd ..
          sha256sum "$archive" > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "${{ env.ARCHIVE }}" \
            "${{ env.ARCHIVE }}.sha256"

  verify:
    name: Verify Install (${{ matrix.os }})
    needs: [create-release, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Verify cargo install --locked
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked --path crates/know_now_cli
          know-now --help || echo "CLI stub — --help not yet implemented"

  publish-release:
    name: Publish Release
    needs: [create-release, build, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false
