services:
  know-now-server:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - serve
      - --host
      - "0.0.0.0"
      - --port
      - "3827"
    ports:
      - "127.0.0.1:3827:3827"
    volumes:
      - ./fixtures/demo_ecommerce:/workspace:ro
      - knownow-state:/workspace/.knownow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3827/__health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: knownow
      # Demo only — change for any real use.
      POSTGRES_PASSWORD: knownow_demo
      POSTGRES_DB: knownow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knownow -d knownow"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.4
    profiles:
      - dbt
    working_dir: /workspace
    volumes:
      - ./fixtures/demo_ecommerce:/workspace:ro
      - knownow-state:/workspace/.knownow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /workspace
    restart: "no"

volumes:
  pgdata:
  knownow-state:
