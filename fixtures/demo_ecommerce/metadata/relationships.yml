relationships:
  - id: rel_order_customer
    from_entity: order
    to_entity: customer
    cardinality: many_to_one
    from_key: customer_id
    to_key: customer_id
    description: Each order belongs to one customer.

  - id: rel_return_order
    from_entity: return
    to_entity: order
    cardinality: many_to_one
    from_key: order_id
    to_key: order_id
    description: Each return references one order.

  - id: rel_product_supplier
    from_entity: product
    to_entity: supplier
    cardinality: many_to_one
    from_key: supplier_id
    to_key: supplier_id
    description: Products are sourced from suppliers.

  - id: rel_inventory_product
    from_entity: inventory
    to_entity: product
    cardinality: many_to_one
    from_key: product_id
    to_key: product_id
    description: Inventory rows reference one product.

  - id: rel_address_customer
    from_entity: address
    to_entity: customer
    cardinality: many_to_one
    from_key: customer_id
    to_key: customer_id
    description: Addresses belong to one customer.

  - id: rel_customer_parent
    from_entity: customer
    to_entity: customer
    cardinality: many_to_one
    from_key: parent_customer_id
    to_key: customer_id
    description: Optional self-referencing customer hierarchy.

  - id: rel_customer_segment
    from_entity: customer
    to_entity: customer_segment
    cardinality: many_to_many
    from_key: customer_id
    to_key: segment_id
    description: Customers can belong to multiple segments.
