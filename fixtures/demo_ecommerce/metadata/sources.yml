sources:
  - name: shopify
    kind: application_export
    tables:
      - name: customers
        entity: customer
        columns:
          - source: id
            target: customer_id
          - source: email
            target: email
          - source: phone
            target: phone
          - source: created_at
            target: created_at
          - source: updated_at
            target: updated_at

      - name: orders
        entity: order
        columns:
          - source: id
            target: order_id
          - source: customer_id
            target: customer_id
          - source: total_price
            target: total_amount
          - source: financial_status
            target: order_status
          - source: created_at
            target: created_at
          - source: updated_at
            target: updated_at

      - name: returns
        entity: return
        columns:
          - source: id
            target: return_id
          - source: order_id
            target: order_id
          - source: customer_id
            target: customer_id
          - source: status
            target: return_status
          - source: refund_amount
            target: refund_amount
          - source: processed_at
            target: processed_at

  - name: erp
    kind: warehouse_extract
    tables:
      - name: products
        entity: product
        columns:
          - source: product_uuid
            target: product_id
          - source: product_name
            target: product_name
          - source: supplier_uuid
            target: supplier_id
          - source: list_price
            target: unit_price
          - source: category
            target: category_code

      - name: suppliers
        entity: supplier
        columns:
          - source: supplier_uuid
            target: supplier_id
          - source: supplier_name
            target: supplier_name
          - source: contact_email
            target: contact_email
          - source: contact_phone
            target: contact_phone
          - source: country_code
            target: country_code

      - name: inventory_snapshot
        entity: inventory
        columns:
          - source: snapshot_uuid
            target: inventory_id
          - source: product_uuid
            target: product_id
          - source: quantity_available
            target: quantity_on_hand
          - source: snapshot_date
            target: snapshot_date
