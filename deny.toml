[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
version = 2
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
  { name = "serde_yaml", reason = "AGENTS.md §4.5 banned dependency" },
  { name = "serde_yml", reason = "AGENTS.md §4.5 banned dependency" },
  { name = "yaml-rust", reason = "AGENTS.md §4.5 bans unreviewed YAML stacks" },
  { name = "yaml-rust2", reason = "AGENTS.md §4.5 bans unreviewed YAML stacks" },
  { name = "unsafe-libyaml", reason = "AGENTS.md §4.5 bans C/FFI YAML parsers" },
  { name = "libyaml-sys", reason = "AGENTS.md §4.5 bans C/FFI YAML parsers" },
  { name = "libyaml-safer", reason = "AGENTS.md §4.5 bans C/FFI YAML parsers" },
  { name = "minijinja", reason = "AGENTS.md §4.5 requires custom-pack renderer restrictions to be explicitly reviewed" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
